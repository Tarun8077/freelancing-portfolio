<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta name="author" content="Tarun Sherwal" />
    <meta
      name="keywords"
      content="Full Stack Developer, Freelance Web Developer, React Developer, Business Websites, AI Web Apps, Greater Noida"
    />

    <!-- Preload the hero portrait (LCP candidate) so it starts fetching before the JS renders -->
    <link rel="preload" as="image" href="/profile.webp" fetchpriority="high" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts loaded here (not via CSS @import) so they're discovered early -->
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <title>Tarun Sherwal — Full Stack Developer</title>
    <meta
      name="description"
      content="Full Stack Developer helping startups, restaurants, and businesses build fast, modern, high-performing websites and web apps. Available for freelance projects worldwide."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tarunsherwal.dev/" />

    <!-- Static social meta for crawlers that don't run JS (Helmet mirrors these client-side) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tarun Sherwal" />
    <meta property="og:title" content="Tarun Sherwal — Full Stack Developer" />
    <meta
      property="og:description"
      content="Full Stack Developer helping startups, restaurants, and businesses build fast, modern, high-performing websites and web apps. Available for freelance projects worldwide."
    />
    <meta property="og:url" content="https://tarunsherwal.dev/" />
    <meta property="og:image" content="https://tarunsherwal.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tarun Sherwal — Full Stack Developer" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tarun Sherwal — Full Stack Developer" />
    <meta
      name="twitter:description"
      content="Full Stack Developer helping startups, restaurants, and businesses build fast, modern, high-performing websites and web apps."
    />
    <meta name="twitter:image" content="https://tarunsherwal.dev/og-image.png" />
    <meta name="twitter:image:alt" content="Tarun Sherwal — Full Stack Developer" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
